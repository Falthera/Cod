name: Auto Tag and Release on main

on:
  push:
    branches: [ "main" ]

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine latest tag
        id: get_latest
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=${latest}" >> $GITHUB_OUTPUT

      - name: Bump patch, create and push tag
        id: bump
        run: |
          latest=${{ steps.get_latest.outputs.latest }}
          echo "Latest tag: ${latest}"
          version=${latest#v}
          IFS='.' read -r major minor patch <<< "${version}"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}
          patch=$((patch + 1))
          new_tag="v${major}.${minor}.${patch}"
          echo "New tag: ${new_tag}"
          git tag "${new_tag}"
          git push origin "${new_tag}"
          echo "new=${new_tag}" >> $GITHUB_OUTPUT
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: gradle clean build

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          find build/libs -maxdepth 1 -type f -name "*.jar" -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - name: Create GitHub Release and attach artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.bump.outputs.new }}
          name: ${{ steps.bump.outputs.new }}
          generate_release_notes: true
          artifactErrorsFailBuild: true
          artifacts: "release-artifacts/*.jar"
