# MidknightGarden default configuration
security:
  secret: "replace_this_with_a_secure_random_value"

npc:
  invulnerable: true
  silent: false
  noAI: true
  displayName: "Midknight Villager"

quest:
  generation:
    pool: [IRON_INGOT, GOLD_INGOT, DIAMOND, ENDER_PEARL, BLAZE_ROD, OBSIDIAN]

bounty:
  duration_seconds: 600
  broadcast_interval_seconds: 60
  reconnect_grace_seconds: 30
  allowed_dimensions: [ANY]
  block_dimension_change: false
  compass_tracking: false

database:
  type: sqlite
  mysql:
    enabled: false
    host: localhost
    port: 3306
    database: midknightgarden
    username: root
    password: change_me

hooks:
  citizens: true
  decentholograms: true
